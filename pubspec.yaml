name: nuvit
description: NUVIT Smart Planner

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP API
  http: ^1.2.2

  # Local notifications
  flutter_local_notifications: ^17.2.0

  # Home screen widget (Версия обновлена для исправления ошибки ViewConfiguration)
  home_widget: ^0.7.0

  # Local Storage для сохранения энергопрофиля
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/images/

    